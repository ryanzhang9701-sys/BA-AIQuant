var ma5 = [], ma10 = [], ma20 = [];
for (var i = 0; i < closes.length; i++) {
  if (i >= 4) { var s5 = 0; for (var j = 0; j < 5; j++) s5 += closes[i - j]; ma5.push(s5 / 5); } else { ma5.push(null); }
  if (i >= 9) { var s10 = 0; for (var j = 0; j < 10; j++) s10 += closes[i - j]; ma10.push(s10 / 10); } else { ma10.push(null); }
  if (i >= 19) { var s20 = 0; for (var j = 0; j < 20; j++) s20 += closes[i - j]; ma20.push(s20 / 20); } else { ma20.push(null); }
}
klineOption.series.push({ name: 'MA5', type: 'line', data: ma5, smooth: true, lineStyle: { width: 1, color: '#f5c542' }, itemStyle: { color: '#f5c542' }, symbol: 'none', emphasis: { disabled: true } });
klineOption.series.push({ name: 'MA10', type: 'line', data: ma10, smooth: true, lineStyle: { width: 1, color: '#42a5f5' }, itemStyle: { color: '#42a5f5' }, symbol: 'none', emphasis: { disabled: true } });
klineOption.series.push({ name: 'MA20', type: 'line', data: ma20, smooth: true, lineStyle: { width: 1, color: '#ab47bc' }, itemStyle: { color: '#ab47bc' }, symbol: 'none', emphasis: { disabled: true } });

// ===== 成交量图 =====
var volumeOption = {
  tooltip: {
    trigger: 'axis',
    axisPointer: { type: 'cross' },
    formatter: function(params) {
      var d = params[0];
      if (!d || d.dataIndex === undefined) return '';
      var rd = rawData[d.dataIndex];
      var dt = d.axisValue;
      var pct = rd[7];
      var pctSign = pct >= 0 ? '+' : '';
      var pctClass = pct >= 0 ? 'color:#ef5350' : 'color:#26a69a';
      return '<div style="font-size:14px;font-weight:600;margin-bottom:6px;">'+dt+'</div>'+
        '成交量：<b>'+(rd[8]/10000).toFixed(2)+'万手</b><br/>'+
        '成交额：<b>¥'+(rd[9]/100000000).toFixed(2)+'亿</b><br/>'+
        '涨跌幅：<b style="'+pctClass+'">'+pctSign+pct.toFixed(2)+'%</b>';
    }
  },
  grid: { left: '10%', right: '10%', top: 10, bottom: 40 },
  xAxis: {
    data: dates,
    axisLine: { lineStyle: { color: '#ddd' } },
    axisLabel: { formatter: function(v) { return v.substring(5); }, color: '#888' }
  },
  yAxis: {
    axisLabel: { formatter: function(v) { return (v/10000).toFixed(0)+'万'; }, color: '#888' },
    splitLine: { lineStyle: { color: '#f0f0f0' } }
  },
  dataZoom: [
    { type: 'inside', xAxisIndex: [0, 0], start: 0, end: 100 },
    { type: 'slider', xAxisIndex: [0, 0], start: 0, end: 100, height: 24, bottom: 6 }
  ],
  series: [{
    type: 'bar',
    data: volumes.map(function(v, i) {
      return { value: v, itemStyle: { color: closes[i] >= rawData[i][1] ? '#ef5350' : '#26a69a' } };
    }),
    emphasis: { itemStyle: { opacity: 0.8 } }
  }]
};

// ===== 渲染 =====
var klineChart = echarts.init(document.getElementById('klineChart'));
klineChart.setOption(klineOption);

var volumeChart = echarts.init(document.getElementById('volumeChart'));
volumeChart.setOption(volumeOption);

var zoomSync = function() {
  var kZoom = klineChart.getOption().dataZoom;
  var vZoom = volumeChart.getOption().dataZoom;
  if (kZoom && kZoom[0]) {
    vZoom[0].start = kZoom[0].start; vZoom[0].end = kZoom[0].end;
    vZoom[1].start = kZoom[1].start; vZoom[1].end = kZoom[1].end;
    volumeChart.setOption({ dataZoom: vZoom });
  }
};
klineChart.on('dataZoom', function() { zoomSync(); });
volumeChart.on('dataZoom', function() {
  var vZoom = volumeChart.getOption().dataZoom;
  var kZoom = klineChart.getOption().dataZoom;
  kZoom[0].start = vZoom[0].start; kZoom[0].end = vZoom[0].end;
  kZoom[1].start = vZoom[1].start; kZoom[1].end = vZoom[1].end;
  klineChart.setOption({ dataZoom: kZoom });
});

window.addEventListener('resize', function() {
  klineChart.resize();
  volumeChart.resize();
});
</script>
</body>
</html>
