<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>目标变量 Y 分布分析</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:"Microsoft YaHei","PingFang SC",sans-serif;background:#f5f6f8;}
.header{text-align:center;padding:16px;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,0.06);}
.header h1{font-size:17px;color:#1a1a2e;margin-bottom:4px;}
.header p{font-size:11px;color:#888;}
#main{width:100%;height:700px;}
</style>
</head>
<body>
<div class="header"><h1>目标变量 Y 分布分析</h1><p>左:总体分布 | 右:各截面正例占比趋势</p></div>
<div id="main"></div>
<script>
var c=echarts.init(document.getElementById('main'));
c.setOption({"tooltip": {"trigger": "item"}, "grid": [{"left": "3%", "top": "5%", "width": "42%", "height": "45%"}, {"left": "52%", "top": "18%", "width": "45%", "height": "60%"}], "xAxis": [{"show": false}, {"type": "category", "gridIndex": 1, "data": ["2021-06-30", "2021-09-30", "2021-12-31", "2022-03-31", "2022-06-30"], "axisLabel": {"rotate": 30, "fontSize": 11, "interval": 0}}], "yAxis": [{"show": false}, {"type": "value", "gridIndex": 1, "name": "正例占比(%)", "min": 11.3, "max": 77.6, "nameTextStyle": {"fontSize": 11}}], "series": [{"type": "pie", "radius": ["30%", "55%"], "center": ["23%", "35%"], "label": {"formatter": "{b}\n{d}%", "fontSize": 12}, "data": [{"value": 8389, "name": "True (正例)", "itemStyle": {"color": "#e74c3c"}}, {"value": 12383, "name": "False (负例)", "itemStyle": {"color": "#2ecc71"}}]}, {"type": "bar", "xAxisIndex": 1, "yAxisIndex": 1, "data": [45.1, 69.99, 24.56, 44.47, 18.93], "barWidth": "45%", "itemStyle": {"color": "#e74c3c", "borderRadius": [4, 4, 0, 0]}, "label": {"show": true, "position": "top", "formatter": "{c}%", "fontSize": 12}, "markLine": {"silent": true, "symbol": "none", "data": [{"type": "average", "label": {"formatter": "均值 {c}%", "fontSize": 10}, "lineStyle": {"color": "#f39c12", "type": "dashed", "width": 2}}]}}]});
window.addEventListener('resize',function(){c.resize();});
</script>
</body>
</html>
